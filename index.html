<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <title>Desserts</title>

  <script src="./script.js" defer></script>
</head>
<body class="body">
  <header class="header">
  </header>
  <main class="main">
    <article class="article">
      <h2 class="article__title">Desserts</h2>
      <section class="article__content" id="articleContent">
        <div class="card" >
          <a class="card__img">
            <img src="./assets/images/image-cake-desktop.jpg" alt="Dessert">
          </a>

            <h3 class="card__title">Wafle</h3>
            <a href="#" class="card__description">Wafle with Berries</a>
            <p class="card__price">$5.99</p>
            <div class="card__button__container">

                1
              </div>
              <button href="#" class="card__button">
                Add to Cart
              </button>
            </div>
          </div> -->
        </div>
      </section>
    </article>
    <aside class="aside">
      <h2 class="aside__title">Your Cart 
        <span class="aside__title__count" id="ordersCount">(3)</span>
      </h2>
      <div class="aside__order">
        <div class="order__empty">
          <img class="order__empty__icon" src="./assets/images/illustration-empty-cart.svg" alt="Empty Cart">
          <p class="order__empty__text">
            Your added items will appear here
          </p>
        </div>
        <div class="order__content">
          <div class="order__content__product">
            <div class="product__content">
              <a class="product__content__title" href="#">
                Wafle with Berries
              </a>
              <div class="product__content__counter">
                <span class="product__content__quantity">1x</span>
                <span class="product__content__price">$5.99</span>
                <span class="product__content__total">$5.99</span>
              </div>
            </div>
            <button class="product__delete">
            </button>
          </div>
          <div class="order__content__product">
            <div class="product__content">
              <a class="product__content__title" href="#">
                Wafle with Berries
              </a>
              <div class="product__content__counter">
                <span class="product__content__quantity">1x</span>
                <span class="product__content__price">$5.99</span>
                <span class="product__content__total">$5.99</span>
              </div>
            </div>
            <button class="product__delete">
            </button>
          </div>
          <div class="order__content__product">
            <div class="product__content">
              <a class="product__content__title" href="#">
                Wafle with Berries
              </a>
              <div class="product__content__counter">
                <span class="product__content__quantity">1x</span>
                <span class="product__content__price">$5.99</span>
                <span class="product__content__total">$5.99</span>
              </div>
            </div>
            <button class="product__delete">
            </button>
          </div>
        </div>
      </div>
      <div class="aside__confirm">
        <div class="aside__confirm__total">
          <span>Order Total</span>
          <strong id="totalPrice">
            $500
          </strong>
        </div>
  
        <div class="aside__confirm__delivery">
          <img class="aside__confirm__delivery__icon" src="./assets/images/icon-carbon-neutral.svg" alt="Carbon Neutral">
          <p class="aside__confirm__delivery__text">
            This is a 
            <strong>carbon-neutral</strong>
            delivery
          </p>
        </div>
  
        <button class="aside__confirm__button">
          Confirm Order
        </button>
      </div>
    </aside>
  </main>
  <footer class="footer">

  <div class="attribution">
    <p>
