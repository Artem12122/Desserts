<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <title>Desserts</title>

  <script src="./script.js" defer></script>
</head>
<body class="body">
  <header class="header">
  </header>
  <main class="main">
    <article class="article">
      <h2 class="article__title">Desserts</h2>
      <section class="article__content" id="articleContent">
        <div class="card" >
          <a class="card__img">
            <img src="./assets/images/image-cake-desktop.jpg" alt="Dessert">
          </a>
          <div class="card__content">
            <h3 class="card__title">Wafle</h3>
            <a href="#" class="card__description">Wafle with Berries</a>
            <p class="card__price">$5.99</p>
            <div class="card__button__container">
              <div class="card__button-active card__button">
                <button class="card__button-active-decrement"></button>
                1
                <button class="card__button-active-increment"></button>
              </div>
              <button href="#" class="card__button card__button-notActive">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
      </section>
    </article>
    <aside class="aside">
    </aside>
  </main>
  <footer class="footer">

  </footer>
  <div class="attribution">
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    </p>
    <p>
      Coded by <a href="#">Artem Lavrenko</a>.
    </p>
  </div>
</body>
</html>
