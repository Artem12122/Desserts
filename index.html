<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <title>Desserts</title>

  <script src="./script.js" defer></script>
</head>
<body class="body">
  <header class="header">
  </header>
  <main class="main">
    <article class="article">
      <h2 class="article__title">Desserts</h2>
      <section class="article__content" id="articleContent">
      </section>
    </article>
    <aside class="aside">
    </aside>
  </main>
  <footer class="footer">

  </footer>
  <div class="attribution">
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    </p>
    <p>
      Coded by <a href="#">Artem Lavrenko</a>.
    </p>
  </div>
  <div id="modal" class="modal__overlay">
    <div class="modal__content">
      <div class="modal__img">
        <img src="./assets/images/icon-order-confirmed.svg" alt="icon-order-confirmed">
      </div>
      <div class="modal__title__container">
        <h3 class="modal__title">
          Order Confirmed
        </h3>
        <p class="modal__subtitle">
          We hope you enjoy your food!
        </p>
      </div>
      <div class="modal__orders">
        <div class="modal__orders__container">
          <div class="modal__orders__product">
            <div class="product__img">
              <img src="./assets/images/image-baklava-mobile.jpg" alt="">
            </div>
            <div class="product__content">
              <p class="product__content__name">
                Classic Tiramisu
              </p>
              <span class="product__content__count">
                6x
              </span>
              <span class="product__content__price">
                $5
              </span>
            </div>
            <div class="product__total">
              $30.00
            </div>
          </div>
        </div>
        <div class="modal__orders__total">
          <p class="total__text">Order Total</p>
          <p class="total__price">$1000.00</p>
        </div>
      </div>
      <button id="modalBtn" class="modal__button">
        Start New Order
      </button>
    </div>
  </div>
</body>
</html>
